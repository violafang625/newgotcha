<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雙寶遊戲艙 (完美排版 + 神獸保存版)</title>
  <style>
    /* 基礎背景與字體 */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #8A7B9D, #B5ACCC); color: #3D3B4F; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
    
    /* 🌟 回歸您最愛的完美寬度比例 */
    .game-container { width: 100%; max-width: 850px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); padding: 20px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 3px solid #F4F3F6; margin-top: 10px; }

    /* 雙寶切換頁籤 */
    .user-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.6); padding: 8px; border-radius: 15px; border: 3px solid #3D3B4F; }
    .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: transparent; color: #8A7B9D; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: white; color: #3D3B4F; border: 3px solid #3D3B4F; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }

    /* 模式切換 */
    .mode-switcher { display: flex; gap: 10px; margin-bottom: 20px; }
    .mode-btn { flex: 1; padding: 10px; border-radius: 12px; border: 3px solid #3D3B4F; background: white; font-weight: bold; color: #3D3B4F; cursor: pointer; box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
    .mode-btn.active { background: #FFF1CD; }
    
    /* 狀態列 */
    .top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .title { font-size: 24px; font-weight: 900; color: #3D3B4F; margin: 0; flex-grow: 1; text-shadow: 1px 1px 0px #FFF; }
    .status-pill { background: white; border: 3px solid #3D3B4F; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }

    /* 卡片與排版 🌟 強制左右並排不換行 */
    .card { background: white; border: 3px solid #3D3B4F; border-radius: 20px; padding: 20px; box-shadow: 4px 4px 0px rgba(61, 59, 79, 0.15); margin-bottom: 15px; box-sizing: border-box; }
    .panel { display: none; gap: 15px; flex-wrap: nowrap; } 
    .panel.active { display: flex; }
    /* 設定 min-width: 0 避免大圖片撐破版面 */
    .left-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; }
    .right-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    
    /* 🌟 回歸完美高度的圖片區塊 */
    .image-placeholder { width: 100%; height: 220px; background: radial-gradient(circle, #FFF1CD, #E2DFE9); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 3px solid #3D3B4F; overflow: hidden; }
    .progress-row { display: flex; width: 100%; gap: 10px; }
    .progress-box { flex: 1; background: #F4F3F6; border: 2px solid #3D3B4F; border-radius: 12px; text-align: center; padding: 8px; }
    .progress-number { font-size: 22px; font-weight: 900; color: #D96C75; }
    .progress-text { font-size: 11px; font-weight: bold; }

    .token-label { font-size: 12px; font-weight: bold; color: #D96C75; letter-spacing: 1px; }
    .token-value { font-size: 40px; font-weight: 900; margin: 5px 0; color: #3D3B4F; }
    
    .btn-action { background: #D96C75; color: white; border: 3px solid #3D3B4F; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0px 4px 0px #3D3B4F; width: 100%; margin-bottom: 10px; transition: 0.1s; }
    .btn-action:active { transform: translateY(4px); box-shadow: 0px 0px 0px #3D3B4F; }
    .btn-book { background: #8A7B9D; }

    /* 控制台任務按鈕 */
    .parent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; width: 100%; }
    .btn-add { background: #8A7B9D; color: white; border: 3px solid #3D3B4F; border-radius: 10px; padding: 12px 8px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0px 3px 0px #3D3B4F; transition: 0.1s; }
    .btn-add:active { transform: translateY(3px); box-shadow: 0px 0px 0px #3D3B4F; }
    .btn-minus { background: #D96C75; }

    /* 互動視窗 (抽卡 / 圖鑑 / 升級) */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 100; justify-content: center; align-items: center; flex-direction: column; padding: 20px; box-sizing: border-box; }
    .modal-overlay.active { display: flex; }
    
    /* 翻卡特效 */
    .flip-card { width: 260px; height: 380px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
    .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 4px solid #3D3B4F; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .flip-card-front { background: repeating-linear-gradient(45deg, #8A7B9D, #8A7B9D 10px, #9B90B2 10px, #9B90B2 20px); border: 8px solid #FFF; }
    .pokeball-logo { width: 60px; height: 60px; background: white; border-radius: 50%; border: 4px solid #3D3B4F; }
    .flip-card-back { background: #FFF; transform: rotateY(180deg); padding: 15px; justify-content: flex-start; }
    .card-img-bg { background: radial-gradient(circle, #FFF1CD, #F4F3F6); width: 100%; height: 150px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; border: 2px solid #3D3B4F; }
    .card-img { max-height: 120px; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.3)); }
    .skill-box { background: #F4F3F6; border: 2px dashed #8A7B9D; border-radius: 10px; padding: 10px; width: 100%; box-sizing: border-box; text-align: left; }
    
    /* 圖鑑與升級面板 */
    .album-modal { display: flex; position: relative; width: 100%; max-width: 650px; min-height: 480px; max-height: 85vh; background: #FFF; border: 4px solid #3D3B4F; border-radius: 20px; z-index: 101; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.4); overflow: hidden; }
    #albumHome { display: flex; flex-direction: column; width: 100%; height: 100%; flex-grow: 1; }
    .album-header { background: #8A7B9D; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; background: #F4F3F6; flex-grow: 1; align-content: start; }
    
    .album-item { background: white; border: 3px solid #3D3B4F; border-radius: 12px; display: flex; flex-direction: column; align-items: center; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
    .album-item:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .album-item img { height: 70px; margin-bottom: 5px; }
    .lv-badge { position: absolute; top: -10px; right: -10px; background: #FFD700; border: 2px solid #3D3B4F; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }

    .upgrade-panel { display: none; width: 100%; height: 100%; background: white; flex-direction: column; box-sizing: border-box; flex-grow: 1; }
    .upgrade-header { background: #3D3B4F; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .upgrade-content { padding: 20px; overflow-y: auto; text-align: center; display: flex; flex-direction: column; align-items: center; flex-grow: 1; }
    .upgrade-skill-card { background: #F4F3F6; border: 3px solid #8A7B9D; border-radius: 15px; padding: 15px; margin: 15px 0; width: 100%; max-width: 400px; text-align: left; }
    .btn-upgrade { background: #FFD700; color: #3D3B4F; border: 3px solid #3D3B4F; border-radius: 12px; padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0px 4px 0px #3D3B4F; margin-top: 10px; }
    .btn-upgrade:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: translateY(4px); }
  </style>
</head>
<body>

  <div class="game-container">
    
    <div class="user-tabs">
      <button class="tab-btn active" id="tab-child1" onclick="switchUser('child1')">👦 大寶Max</button>
      <button class="tab-btn" id="tab-child2" onclick="switchUser('child2')">👧 二寶Anna</button>
    </div>

    <div class="mode-switcher">
      <button class="mode-btn active" id="btnStudent" onclick="switchMode('student')">🎮 遊戲艙</button>
      <button class="mode-btn" id="btnParent" onclick="switchMode('parent')">⚙️ 控制台</button>
    </div>

    <div class="top-bar">
      <h1 class="title" id="pageTitle">Max的遊戲艙</h1>
      <div class="status-pill" id="topCoinDisplay">0 代幣</div>
    </div>

    <div id="studentPanel" class="panel active">
      <div class="card left-panel">
        <div class="image-placeholder">
          <img id="gachaImage" src="" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.2));">
        </div>
        <div class="progress-row">
          <div class="progress-box"><div class="progress-number" id="gachaCount">0</div><div class="progress-text">累計抽卡</div></div>
          <div class="progress-box"><div class="progress-number" id="collectionCount">0</div><div class="progress-text">圖鑑數</div></div>
        </div>
      </div>

      <div class="card right-panel">
        <div class="token-label">TOKEN READY</div>
        <div class="token-value" id="mainCoinDisplay">0</div>
        <p style="font-size: 14px; color: #666; margin-bottom: 15px; font-weight: bold;">使用代幣抽取寶可夢！<br>在收集冊中還可以花點數將卡牌能力升級喔！</p>
        <button class="btn-action" onclick="drawCard()">🃏 抽取寶可夢 (扣 50 點)</button>
        <button class="btn-action btn-book" onclick="openAlbum()">📖 打開收集冊 (升級技能)</button>
      </div>
    </div>

    <div id="parentPanel" class="panel">
      <div class="card" style="width: 100%;">
        <h3 style="margin-top: 0; color: #8A7B9D;">發放代幣給：<span id="targetName">大寶</span></h3>
        <div class="parent-grid">
          <button class="btn-add" onclick="addPoints(5)">🧹 主動做家事 (+5)</button>
          <button class="btn-add" onclick="addPoints(5)">📚 認真完成功課 (+5)</button>
          <button class="btn-add" onclick="addPoints(5)">🐈 完成讀經班功課 (+5)</button>
          <button class="btn-add" onclick="addPoints(10)">🛏️ 唸英文 (+10)</button>
          <button class="btn-add" onclick="addPoints(5)">🛵 閱讀 (+5)</button>
          <button class="btn-add" onclick="addPoints(5)">✨ 今日事今日畢 (+5)</button>
          <button class="btn-add" onclick="addPoints(5)">✨ 說好話、不吵架 (+5)</button>
          <button class="btn-add btn-minus" onclick="addPoints(-5)">扣除代幣 (-5)</button>
        </div>
        <div style="margin-top: 15px; padding: 10px; background: #F4F3F6; border-radius: 10px; font-size: 13px; font-weight: bold; color: #8A7B9D;" id="systemLog">系統紀錄：準備就緒...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="drawModal">
    <h2 style="color: white; margin-bottom: 20px; text-shadow: 2px 2px 4px #000;" id="clickHint">✨ 點擊卡牌翻開 ✨</h2>
    <div class="flip-card" id="flipCard" onclick="flipTheCard()">
      <div class="flip-card-inner">
        <div class="flip-card-front"><div class="pokeball-logo"></div></div>
        <div class="flip-card-back">
          <div class="card-img-bg"><img id="resultImg" class="card-img" src=""></div>
          <h2 style="margin: 5px 0; color: #3D3B4F;" id="resultName">寶可夢</h2>
          <div class="skill-box">
            <div style="font-size: 14px; font-weight: bold; color: #8A7B9D;">⚔️ 初始技能：<span id="resultSkillName">技能名</span></div>
            <div style="font-size: 13px; font-weight: bold; color: #5D576B; margin-top: 5px;" id="resultSkillDesc">說明</div>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-action" style="width: 200px; display: none;" id="closeDrawBtn" onclick="closeDrawModal()">收入圖鑑</button>
  </div>

  <div class="modal-overlay" id="albumOverlay">
    <div class="album-modal">
      <div id="albumHome">
        <div class="album-header">
          <h3 style="margin: 0;" id="albumTitle">大寶的收集冊</h3>
          <button style="background: white; border: 2px solid #3D3B4F; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;" onclick="closeAlbum()">關閉</button>
        </div>
        <div class="album-grid" id="albumGrid"></div>
      </div>

      <div class="upgrade-panel" id="upgradePanel">
        <div class="upgrade-header">
          <button style="background: transparent; border: none; color: white; font-size: 16px; cursor: pointer; font-weight: bold;" onclick="backToAlbum()">◀ 返回圖鑑</button>
          <span id="upgTitle">進化面板</span>
          <div style="width: 80px;"></div>
        </div>
        <div class="upgrade-content">
          <img id="upgImg" style="height: 120px; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.2)); margin-bottom: 10px;" src="">
          <h2 style="margin: 0; color: #3D3B4F;" id="upgName">寶可夢</h2>
          <div class="upgrade-skill-card">
            <div style="color: #8A7B9D; font-weight: bold; font-size: 14px; margin-bottom: 5px;">目前等級能力：</div>
            <div style="font-size: 18px; font-weight: 900; color: #3D3B4F;" id="upgCurrentSkill">技能 Lv.1</div>
            <div style="font-size: 14px; font-weight: bold; color: #666; margin-top: 5px;" id="upgCurrentDesc">效果說明</div>
          </div>
          <div id="upgradeActionBox" style="width: 100%; max-width: 400px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 💥 完美包含所有頂級神獸在內的 50 隻寶可夢完整資料庫！
    const pokemonDB = {
      'arceus': { id: 'arceus', name: '阿爾宙斯', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/493.png', skills: [ { level: 1, name: '創世之光 Lv.1', desc: '神之造物主！發動可獲得【無條件免除一週所有繁瑣家事】。', cost: 0 }, { level: 2, name: '宇宙審判 Lv.Max', desc: '終極願望！可以跟媽媽兌換一個價值 500 元以內的特製大禮物！', cost: 800 } ] },
      'rayquaza': { id: 'rayquaza', name: '烈空坐', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/384.png', skills: [ { level: 1, name: '神速 Lv.1', desc: '只要今天在學校就把功課寫完，回家立刻額外獲得 50 代幣。', cost: 0 }, { level: 2, name: '畫龍點睛 Lv.Max', desc: '天空主宰！可以兌換去文具店親自挑選一個喜歡的模型或盲盒。', cost: 600 } ] },
      'dialga': { id: 'dialga', name: '帝牙盧卡', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/483.png', skills: [ { level: 1, name: '時間咆哮 Lv.1', desc: '時空暫停！看電視或打平板的休閒時間可以【當場延長 30 分鐘】。', cost: 0 }, { level: 2, name: '時空逆轉 Lv.Max', desc: '時間掌控者！今天的所有未完成功課或家事可以移到明天再做。', cost: 500 } ] },
      'groudon': { id: 'groudon', name: '固拉多', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/383.png', skills: [ { level: 1, name: '斷崖之劍 Lv.1', desc: '大地之力！今天只要主動幫忙鏟貓砂，獲得的點數直接翻倍。', cost: 0 }, { level: 2, name: '終結之地 Lv.Max', desc: '全家今天出去聚餐時，你可以主導指定一家你最想吃的餐廳！', cost: 400 } ] },
      'kyogre': { id: 'kyogre', name: '蓋歐卡', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/382.png', skills: [ { level: 1, name: '根源波動 Lv.1', desc: '海洋召喚！可以要求今天洗澡泡澡延長 30 分鐘，盡情玩水玩具。', cost: 0 }, { level: 2, name: '始源之海 Lv.Max', desc: '這個週末的行程，全家必須一起去游泳池、海邊或水上樂園玩！', cost: 500 } ] },
      'palkia': { id: 'palkia', name: '帕路奇亞', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/484.png', skills: [ { level: 1, name: '亞空裂斬 Lv.1', desc: '空間粉碎！可以得到一次「免除聽媽媽碎碎念」的隱形護盾金牌。', cost: 0 }, { level: 2, name: '空間重組 Lv.Max', desc: '你可以自由規劃自己的房間布置，或者是買一件新衣服、新鞋子。', cost: 400 } ] },
      'giratina': { id: 'giratina', name: '騎拉帝歐', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/487.png', skills: [ { level: 1, name: '潛靈奇襲 Lv.1', desc: '幽靈潛行！遇到不想吃的青菜或食物時，可以用此卡少吃兩口。', cost: 0 }, { level: 2, name: '反轉世界 Lv.Max', desc: '命運交替！今天可以指定爸爸或媽媽幫你跑腿或拿一次東西。', cost: 500 } ] },
      'zekrom': { id: 'zekrom', name: '捷克羅姆', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/644.png', skills: [ { level: 1, name: '雷擊 Lv.1', desc: '理想之雷！玩 Switch 或平板的遊戲時間直接增加 20 分鐘。', cost: 0 }, { level: 2, name: '交錯閃電 Lv.Max', desc: '可以跟家長兌換一組全新的貼紙、文具或是精美卡牌一包。', cost: 450 } ] },
      'ho_oh': { id: 'ho_oh', name: '鳳王', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/250.png', skills: [ { level: 1, name: '神聖之火 Lv.1', desc: '浴火重生！如果今天不小心犯錯被扣點數，此卡能將罰金減半。', cost: 0 }, { level: 2, name: '聖灰復甦 Lv.Max', desc: '奇蹟降臨！今天如果想多喝一罐飲料或多吃冰棒，可以跟媽媽換。', cost: 400 } ] },
     'bulbasaur': { id: 'bulbasaur', name: '妙蛙種子', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png', skills: [ { level: 1, name: '藤鞭', desc: '草系環保大師！下次做家事任務時，獲得的代幣獎勵多 5 枚。', cost: 0 }, { level: 2, name: '日光束', desc: '連續一週主動維持房間整潔，可兌換一組精美小文具。', cost: 80 } ] },

      'mimikyu': { id: 'mimikyu', name: '謎擬Q', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/778.png', skills: [ { level: 1, name: '畫皮', desc: '替身防禦！抵銷一次不想吃的食物（例如青椒或胡蘿蔔）。', cost: 0 }, { level: 2, name: '嬉鬧', desc: '化裝舞會！可以買一個可愛的小吊飾或轉一次扭蛋。', cost: 100 } ] },
      'scorbunny': { id: 'scorbunny', name: '炎兔兒', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/815.png', skills: [ { level: 1, name: '蓄能焰襲', desc: '活力滿點！週末可以去體育館或公園盡情運動跑跳。', cost: 0 }, { level: 2, name: '火焰球', desc: '獲得一套新的運動襪或是小體育用品！', cost: 150 } ] },
      'sprigatito': { id: 'sprigatito', name: '新葉喵', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1006.png', skills: [ { level: 1, name: '樹葉', desc: '自帶香氣～今天洗澡可以選喜歡的沐浴乳味道。', cost: 0 }, { level: 2, name: '千變萬花', desc: '魔術秀！可以要求買一本喜歡的課外讀物或繪本。', cost: 120 } ] },
      'fuecoco': { id: 'fuecoco', name: '呆火鱷', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1009.png', skills: [ { level: 1, name: '火花', desc: '吃貨屬性！獲得一包喜歡的洋芋片或零嘴。', cost: 0 }, { level: 2, name: '閃焰高歌', desc: 'KTV之王！週末可以在家拿麥克風大聲唱歌半小時！', cost: 100 } ] },
      'quaxly': { id: 'quaxly', name: '潤水鴨', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1012.png', skills: [ { level: 1, name: '水槍', desc: '愛乾淨！主動把自己的鞋子刷洗乾淨，可獲得 20 代幣。', cost: 0 }, { level: 2, name: '流水步', desc: '水上漫步！指定下雨天全家一起穿雨衣雨鞋出去踩水坑！', cost: 110 } ] }
    };

    // 🔒 關鍵修復：優先從瀏覽器磁碟讀取歷史資料，若沒有才初始化為 0
    let users = JSON.parse(localStorage.getItem('pokemonGameData_v2')) || {
      'child1': { name: 'Max', coins: 0, pulls: 0, cards: {} }, 
      'child2': { name: 'Anna', coins: 0, pulls: 0, cards: {} }
    };
    
    let currentUser = 'child1';
    let currentViewCardId = null; 
    let isFlipping = false;

    // 💾 自動儲存資料至本機的防歸零防線
    function saveGameData() {
      localStorage.setItem('pokemonGameData_v2', JSON.stringify(users));
    }

    // 🌟 雙寶切換魔法與動態換圖
    function switchUser(userId) {
      currentUser = userId;
      document.getElementById('tab-child1').classList.toggle('active', userId === 'child1');
      document.getElementById('tab-child2').classList.toggle('active', userId === 'child2');
      document.getElementById('pageTitle').innerText = users[userId].name + '的遊戲艙';
      document.getElementById('targetName').innerText = users[userId].name;

      // ⭐ 請把這裡的網址，換成您的扭蛋機跟仙子伊布！
      const gachaImg = document.getElementById('gachaImage');
      if (userId === 'child1') {
        // 大寶 Max 的專屬圖片 (可愛扭蛋機或可達鴨)
        gachaImg.src = "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZGlyMHFwMDg5aXhmZnlnMzhnMXc3aXA5ZHBreGt4a3R1eHpnc2swNiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/gL5S4YWV9uwhvH33Re/giphy.gif"; 
      } else if (userId === 'child2') {
        // 二寶 Anna 的專屬圖片 (仙子伊布)
        gachaImg.src = "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWh3MHV3M3kxa3B1OTRlaHl5dXR2OGxrZzF1NWwxdXA0emRkY2E0NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/u8i2dfU1NbhDO/giphy.gif";
      }

      updateUI();
    }

    function switchMode(mode) {
      document.getElementById('studentPanel').classList.toggle('active', mode === 'student');
      document.getElementById('parentPanel').classList.toggle('active', mode === 'parent');
      document.getElementById('btnStudent').classList.toggle('active', mode === 'student');
      document.getElementById('btnParent').classList.toggle('active', mode === 'parent');
    }

    function updateUI() {
      const data = users[currentUser];
      document.getElementById('topCoinDisplay').innerText = data.coins + ' 代幣';
      document.getElementById('mainCoinDisplay').innerText = data.coins;
      document.getElementById('gachaCount').innerText = data.pulls;
      document.getElementById('collectionCount').innerText = Object.keys(data.cards).length;
    }

    function addPoints(pts) {
      users[currentUser].coins = Math.max(0, users[currentUser].coins + pts);
      updateUI();
      saveGameData(); 
      let action = pts > 0 ? `發放了 ${pts} 代幣` : `扣除了 ${Math.abs(pts)} 代幣`;
      document.getElementById('systemLog').innerText = `系統紀錄：剛才成功${action}！`;
    }

    function drawCard() {
      const data = users[currentUser];
      
      if (data.coins >= 50) {
        data.coins -= 50;
        data.pulls += 1;
        
        const keys = Object.keys(pokemonDB);
        const randomId = keys[Math.floor(Math.random() * keys.length)];
        const poke = pokemonDB[randomId];
        
        let isDuplicate = false;
        if (!data.cards[randomId]) {
          data.cards[randomId] = 1; 
        } else {
          isDuplicate = true;
          data.coins += 30; 
        }
        
        updateUI();
        saveGameData(); 

        document.getElementById('resultImg').src = poke.img;
        document.getElementById('resultName').innerText = poke.name + (isDuplicate ? ' (重複卡，退還30代幣)' : '');
        document.getElementById('resultSkillName').innerText = poke.skills[0].name;
        document.getElementById('resultSkillDesc').innerText = poke.skills[0].desc;
        
        document.getElementById('flipCard').classList.remove('is-flipped');
        document.getElementById('clickHint').style.display = 'block';
        document.getElementById('closeDrawBtn').style.display = 'none';
        document.getElementById('drawModal').classList.add('active');
        isFlipping = false;
      } else {
        alert('代幣不足 50 點喔！快去完成任務吧！');
      }
    }

    function flipTheCard() {
      if (isFlipping) return;
      isFlipping = true;
      document.getElementById('flipCard').classList.add('is-flipped');
      document.getElementById('clickHint').style.display = 'none';
      setTimeout(() => document.getElementById('closeDrawBtn').style.display = 'block', 800);
    }

    function closeDrawModal() {
      document.getElementById('drawModal').classList.remove('active');
    }
    
    function openAlbum() {
      const data = users[currentUser];
      document.getElementById('albumTitle').innerText = data.name + '的收集冊';
      
      const grid = document.getElementById('albumGrid');
      grid.innerHTML = '';
      
      const ownedKeys = Object.keys(data.cards);
      if (ownedKeys.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #8A7B9D; padding: 30px; font-weight: bold;">目前還沒有寶可夢喔，快去幫忙做任務抽卡吧！</div>';
      } else {
        ownedKeys.forEach(id => {
          const poke = pokemonDB[id];
          const level = data.cards[id];
          const isMax = level === poke.skills.length;
          
          grid.innerHTML += `
            <div class="album-item" onclick="openUpgradePanel('${id}')">
              <div class="lv-badge" style="${isMax ? 'background:#8A7B9D; color:white;' : ''}">Lv.${isMax ? 'Max' : level}</div>
              <img src="${poke.img}">
              <span style="font-size: 13px; font-weight: bold; color: #3D3B4F;">${poke.name}</span>
            </div>
          `;
        });
      }
      
      document.getElementById('albumHome').style.display = 'flex';
      document.getElementById('upgradePanel').style.display = 'none';
      document.getElementById('albumOverlay').classList.add('active');
    }

    function closeAlbum() {
      document.getElementById('albumOverlay').classList.remove('active');
    }

    function openUpgradePanel(id) {
      currentViewCardId = id;
      const data = users[currentUser];
      const poke = pokemonDB[id];
      const currentLevel = data.cards[id];
      
      const currentSkill = poke.skills[currentLevel - 1];
      
      document.getElementById('upgImg').src = poke.img;
      document.getElementById('upgName').innerText = poke.name;
      document.getElementById('upgCurrentSkill').innerText = currentSkill.name;
      document.getElementById('upgCurrentDesc').innerText = currentSkill.desc;
      
      const actionBox = document.getElementById('upgradeActionBox');
      
      if (currentLevel < poke.skills.length) {
        const nextSkill = poke.skills[currentLevel];
        const canAfford = data.coins >= nextSkill.cost;
        actionBox.innerHTML = `
          <div style="font-size: 14px; font-weight: bold; color: #D96C75; margin-bottom: 5px;">⬇ 下一級進化預覽 ⬇</div>
          <div style="background: white; border: 2px dashed #D96C75; border-radius: 12px; padding: 12px; text-align: left; margin-bottom: 15px;">
            <div style="font-weight: 900; color: #3D3B4F; font-size: 16px;">${nextSkill.name}</div>
            <div style="font-size: 13px; color: #666; margin-top: 5px; font-weight: bold;">${nextSkill.desc}</div>
          </div>
          <button class="btn-upgrade" ${canAfford ? '' : 'disabled'} onclick="buyUpgrade()">
            ⬆ 花費 ${nextSkill.cost} 代幣升級技能 ⬆
          </button>
          ${!canAfford ? `<div style="font-size:12px; color:#D96C75; margin-top:5px; font-weight:bold;">代幣餘額不足，快去幫忙做任務吧！</div>` : ''}
        `;
      } else {
        actionBox.innerHTML = `
          <div style="background: #FFF1CD; border: 3px solid #FFD700; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 900; color: #3D3B4F;">
            ⭐ 此寶可夢技能已達最高等級！⭐
          </div>
        `;
      }
      
      document.getElementById('albumHome').style.display = 'none';
      document.getElementById('upgradePanel').style.display = 'flex';
    }

    function buyUpgrade() {
      const data = users[currentUser];
      const poke = pokemonDB[currentViewCardId];
      const currentLevel = data.cards[currentViewCardId];
      const nextSkill = poke.skills[currentLevel];
      
      if (data.coins >= nextSkill.cost) {
        data.coins -= nextSkill.cost;
        data.cards[currentViewCardId] += 1; 
        updateUI();
        saveGameData(); 
        
        alert(`🎉 升級成功！${poke.name} 掌握了「${nextSkill.name}」！`);
        openUpgradePanel(currentViewCardId); 
      }
    }

    function backToAlbum() {
      openAlbum(); 
    }

    // 啟動時預設載入大寶資料並同步最新UI狀態
    switchUser('child1');
  </script>

</body>
</html>
